<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Footcap - My Profile</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <style>
        .profile-container {
            padding: 150px 20px 50px;
            max-width: 800px;
            margin: 0 auto;
        }

        .order-card {
            border: 1px solid #eee;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .order-items li {
            margin-bottom: 5px;
        }
    </style>
</head>

<body>
    <header class="header" data-header>
        <div class="container">
            <a href="index.html" class="logo"><img src="./assets/images/logo.svg" width="160" height="50"
                    alt="Footcap"></a>
            <nav class="navbar" data-navbar>
                <a href="index.html" class="logo"><img src="./assets/images/logo.svg" width="190" height="50"
                        alt="Footcap"></a>
                <ul class="navbar-list">
                    <li class="navbar-item"><a href="index.html" class="navbar-link">Home</a></li>
                    <li class="navbar-item"><a href="about.html" class="navbar-link">About</a></li>
                    <li class="navbar-item"><a href="shop.html" class="navbar-link">Shop</a></li>
                    
                    <li class="navbar-item"><a href="contact.html" class="navbar-link">Contact</a></li>
                </ul>
                <ul class="nav-action-list">
                    <li class="language-selector">
                        <button class="nav-action-btn">
                            <ion-icon name="globe-outline" aria-hidden="true"></ion-icon>
                            <span class="nav-action-text">EN</span>
                            <ion-icon name="chevron-down-outline" aria-hidden="true"></ion-icon>
                        </button>
                        <ul class="dropdown-list">
                            <li><a href="#" class="dropdown-link">English - EN</a></li>
                            <li><a href="#" class="dropdown-link">Hindi - HI</a></li>
                            <li><a href="#" class="dropdown-link">Tamil - TA</a></li>
                        </ul>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="profile-container">
        <h1>My Order History</h1>
        <div id="user-orders"></div>
        <p id="login-msg" style="display:none;">Please <a href="login.html">login</a> to view your orders.</p>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const userStr = localStorage.getItem('footcap-user');
            let email = null;

            if (userStr) {
                const user = JSON.parse(userStr);
                email = user.email;
                document.querySelector('h1').innerText = `Hello, ${user.name} - My Orders`;
            } else {
                // Fallback for demo (if user checkout as guest or old method)
                email = prompt("Enter your email to view your orders (Guest/Demo):");
            }

            if (!email) {
                document.getElementById('login-msg').style.display = 'block';
                return;
            }

            try {
                const response = await fetch(`/api/orders/user/${email}`);
                const orders = await response.json();

                if (orders.length === 0) {
                    document.getElementById('user-orders').innerHTML = '<p>No orders found.</p>';
                    return;
                }

                document.getElementById('user-orders').innerHTML = orders.map(order => `
                    <div class="order-card">
                        <div class="order-header">
                            <strong>Order #${order.id}</strong>
                            <span>${new Date(order.date).toLocaleDateString()}</span>
                            <span style="color: var(--bittersweet);">$${order.total.toFixed(2)}</span>
                        </div>
                        <ul class="order-items">
                            ${order.items.map(i => `<li>${i.title} x ${i.quantity}</li>`).join('')}
                        </ul>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                            <p style="margin:0;">Status: <strong>${order.status}</strong></p>
                            <a href="track-order.html?id=${order.id}" style="padding:5px 15px; background:var(--bittersweet); color:white; border-radius:4px; font-size:0.9rem;">Track Order</a>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error(error);
                document.getElementById('user-orders').innerHTML = '<p>Error loading orders.</p>';
            }
        });
    </script>
    <script src="./assets/js/script.js"></script>
    <script src="./assets/js/lang-script.js"></script>
</body>

</html>
