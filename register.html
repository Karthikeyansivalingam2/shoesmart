<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Footcap - Register</title>
    <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 150px auto 50px;
            padding: 30px;
            border: 1px solid #eee;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .auth-title {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 30px;
            color: var(--eerie-black);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--bittersweet);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: var(--salmon);
        }

        .auth-link {
            text-align: center;
            margin-top: 20px;
            color: var(--sonic-silver);
        }

        .auth-link a {
            color: var(--bittersweet);
            font-weight: 600;
        }
    </style>
</head>

<body id="top">

    <header class="header" data-header>
        <div class="container">
            <div class="overlay" data-overlay></div>
            <a href="index.html" class="logo"><img src="./assets/images/logo.svg" width="160" height="50"
                    alt="Footcap logo"></a>
            <button class="nav-open-btn" data-nav-open-btn aria-label="Open Menu"><ion-icon
                    name="menu-outline"></ion-icon></button>
            <nav class="navbar" data-navbar>
                <button class="nav-close-btn" data-nav-close-btn aria-label="Close Menu"><ion-icon
                        name="close-outline"></ion-icon></button>
                <a href="index.html" class="logo"><img src="./assets/images/logo.svg" width="190" height="50"
                        alt="Footcap logo"></a>
                <ul class="navbar-list">
                    <li class="navbar-item"><a href="index.html" class="navbar-link">Home</a></li>
                    <li class="navbar-item"><a href="about.html" class="navbar-link">About</a></li>
                    <li class="navbar-item"><a href="shop.html" class="navbar-link">Shop</a></li>
                    
                    <li class="navbar-item"><a href="contact.html" class="navbar-link">Contact</a></li>
                </ul>
                <ul class="nav-action-list">
                    <li>
                        <button class="nav-action-btn">
                            <ion-icon name="search-outline" aria-hidden="true"></ion-icon>
                            <span class="nav-action-text">Search</span>
                        </button>
                    </li>
                    <li class="language-selector">
                        <button class="nav-action-btn">
                            <ion-icon name="globe-outline" aria-hidden="true"></ion-icon>
                            <span class="nav-action-text">EN</span>
                            <ion-icon name="chevron-down-outline" aria-hidden="true"></ion-icon>
                        </button>
                        <ul class="dropdown-list">
                            <li><a href="#" class="dropdown-link">English - EN</a></li>
                            <li><a href="#" class="dropdown-link">Hindi - HI</a></li>
                            <li><a href="#" class="dropdown-link">Tamil - TA</a></li>
                        </ul>
                    </li>
                    <li>
                        <a href="login.html" class="nav-action-btn">
                            <ion-icon name="person-outline" aria-hidden="true"></ion-icon>
                            <span class="nav-action-text">Login / Register</span>
                        </a>
                    </li>
                    <li>
                        <button class="nav-action-btn">
                            <ion-icon name="heart-outline" aria-hidden="true"></ion-icon>
                            <span class="nav-action-text">Wishlist</span>
                            <data class="nav-action-badge" value="5" aria-hidden="true">5</data>
                        </button>
                    </li>
                    <li>
                        <button class="nav-action-btn">
                            <ion-icon name="bag-outline" aria-hidden="true"></ion-icon>
                            <data class="nav-action-text" value="318.00">Basket: <strong>$0.00</strong></data>
                            <data class="nav-action-badge" value="0" aria-hidden="true">0</data>
                        </button>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="auth-container">
            <h1 class="auth-title">Register</h1>
            <form id="register-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-submit">Register</button>
            </form>
            <div class="auth-link">
                <p>Already have an account? <a href="login.html">Login</a></p>
            </div>
        </div>
    </main>

    <script src="./assets/js/script.js"></script>
    <script src="./assets/js/lang-script.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:3000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await response.json();

                if (response.ok) {
                    alert("Registration Successful! Please login.");
                    window.location.href = 'login.html';
                } else {
                    alert(data.message || 'Registration failed');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred. Please try again.');
            }
        });
    </script>
</body>

</html>
