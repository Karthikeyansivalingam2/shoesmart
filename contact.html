<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Footcap - Contact</title>
    <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">
</head>

<body id="top">
    <header class="header" data-header>
        <div class="container">
            <div class="overlay" data-overlay></div>
            <a href="index.html" class="logo"><img src="./assets/images/logo.svg" width="160" height="50"
                    alt="Footcap logo"></a>
            <button class="nav-open-btn" data-nav-open-btn aria-label="Open Menu"><ion-icon
                    name="menu-outline"></ion-icon></button>
            <nav class="navbar" data-navbar>
                <button class="nav-close-btn" data-nav-close-btn aria-label="Close Menu"><ion-icon
                        name="close-outline"></ion-icon></button>
                <a href="index.html" class="logo"><img src="./assets/images/logo.svg" width="190" height="50"
                        alt="Footcap logo"></a>
                <ul class="navbar-list">
                    <li class="navbar-item"><a href="index.html" class="navbar-link">Home</a></li>
                    <li class="navbar-item"><a href="about.html" class="navbar-link">About</a></li>
                    <li class="navbar-item"><a href="shop.html" class="navbar-link">Shop</a></li>
                    
                    <li class="navbar-item"><a href="contact.html" class="navbar-link">Contact</a></li>
                </ul>
                <ul class="nav-action-list">
                    <li>
                        <button class="nav-action-btn">
                            <ion-icon name="search-outline" aria-hidden="true"></ion-icon>
                            <span class="nav-action-text">Search</span>
                        </button>
                    </li>
                    <li class="language-selector">
                        <button class="nav-action-btn">
                            <ion-icon name="globe-outline" aria-hidden="true"></ion-icon>
                            <span class="nav-action-text">EN</span>
                            <ion-icon name="chevron-down-outline" aria-hidden="true"></ion-icon>
                        </button>
                        <ul class="dropdown-list">
                            <li><a href="#" class="dropdown-link">English - EN</a></li>
                            <li><a href="#" class="dropdown-link">Hindi - HI</a></li>
                            <li><a href="#" class="dropdown-link">Tamil - TA</a></li>
                        </ul>
                    </li>
                    <li>
                        <a href="login.html" class="nav-action-btn">
                            <ion-icon name="person-outline" aria-hidden="true"></ion-icon>
                            <span class="nav-action-text">Login / Register</span>
                        </a>
                    </li>
                    <li>
                        <button class="nav-action-btn">
                            <ion-icon name="heart-outline" aria-hidden="true"></ion-icon>
                            <span class="nav-action-text">Wishlist</span>
                            <data class="nav-action-badge" value="5" aria-hidden="true">5</data>
                        </button>
                    </li>
                    <li>
                        <button class="nav-action-btn">
                            <ion-icon name="bag-outline" aria-hidden="true"></ion-icon>
                            <data class="nav-action-text" value="318.00">Basket: <strong>$0.00</strong></data>
                            <data class="nav-action-badge" value="0" aria-hidden="true">0</data>
                        </button>
                    </li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <section class="section" style="padding-top: 150px;">
            <div class="container">
                <h2 class="h2 section-title">Contact Us</h2>
                <form action="#"
                    style="max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px;">
                    <input type="text" placeholder="Your Name"
                        style="padding: 15px; border: 1px solid #ddd; border-radius: 5px;" required>
                    <input type="email" placeholder="Your Email"
                        style="padding: 15px; border: 1px solid #ddd; border-radius: 5px;" required>
                    <textarea placeholder="Message" rows="5"
                        style="padding: 15px; border: 1px solid #ddd; border-radius: 5px; resize: vertical;"
                        required></textarea>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </div>
        </section>
    </main>
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <script src="./assets/js/script.js"></script>
    <script src="./assets/js/lang-script.js"></script>
</body>

</html>
