<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Footcap - Admin Dashboard</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <style>
        .admin-container {
            padding: 150px 50px 50px;
            max-width: 1200px;
            margin: 0 auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: var(--eerie-black);
            color: white;
        }

        .status-pending {
            color: orange;
            font-weight: bold;
        }

        .status-shipped {
            color: blue;
            font-weight: bold;
        }

        .status-delivered {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body id="top">
    <header class="header" data-header>
        <div class="container">
            <a href="index.html" class="logo"><img src="./assets/images/logo.svg" width="160" height="50"
                    alt="Footcap"></a>
            <h2 style="margin-left: 20px;">Admin Panel</h2>
            <nav class="navbar" data-navbar style="margin-left: auto;">
                <ul class="navbar-list" style="display: flex; gap: 20px;">
                    <li class="navbar-item"><a href="index.html" class="navbar-link">View Site</a></li>
                    <li class="navbar-item" class="language-selector" style="position: relative;">
                        <!-- Inline Language Selector for Admin -->
                        <select onchange="localStorage.setItem('footcap-lang', this.value); location.reload();"
                            style="padding: 5px; border-radius: 4px; border: 1px solid #ccc;">
                            <option value="en">English</option>
                            <option value="hi">Hindi</option>
                            <option value="ta">Tamil</option>
                        </select>
                        <script>
                            document.addEventListener('DOMContentLoaded', () => {
                                const saved = localStorage.getItem('footcap-lang') || 'en';
                                const select = document.querySelector('select[onchange^="localStorage"]');
                                if (select) select.value = saved;
                            });
                        </script>
                    </li>
                    <li class="navbar-item">
                        <button onclick="logoutAdmin()" class="navbar-link"
                            style="background:none; border:none; cursor:pointer; font:inherit; color:inherit;">Logout</button>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="admin-container">
        <!-- Add Product Section -->
        <section class="form-section" style="margin-bottom: 50px;">
            <h2>Add New Product</h2>
            <form id="add-product-form" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div style="grid-column: span 2;">
                    <label>Product Title</label>
                    <input type="text" name="title" required placeholder="e.g. Nike Air Max"
                        style="width: 100%; padding: 10px;">
                </div>
                <div>
                    <label>Price ($)</label>
                    <input type="number" name="price" step="0.01" required placeholder="100.00"
                        style="width: 100%; padding: 10px;">
                </div>
                <div>
                    <label>Category</label>
                    <select name="category" style="width: 100%; padding: 10px;">
                        <option value="nike">Nike</option>
                        <option value="adidas">Adidas</option>
                        <option value="puma">Puma</option>
                        <option value="bata">Bata</option>
                        <option value="apex">Apex</option>
                    </select>
                </div>
                <div style="grid-column: span 2;">
                    <label>Image Filename (must be in assets/images/)</label>
                    <input type="text" name="image" required placeholder="product-1.jpg"
                        style="width: 100%; padding: 10px;">
                </div>
                <button type="submit"
                    style="grid-column: span 2; padding: 15px; background: var(--bittersweet); color: white; border: none; cursor: pointer;">Add
                    Product</button>
            </form>
        </section>

        <h1>All Orders</h1>
        <table>
            <thead>
                <tr>
                    <th>Date / Order ID</th>
                    <th>Customer Details</th>
                    <th>Ordered Items</th>
                    <th>Total Limit</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="orders-table-body">
                <!-- Rows loaded via JS -->
            </tbody>
        </table>
    </main>

    <script>
        // Auth Check
        if (!localStorage.getItem('footcap-admin-token')) {
            window.location.href = 'admin-login.html';
        }

        function logoutAdmin() {
            localStorage.removeItem('footcap-admin-token');
            alert('Logged out successfully.');
            window.location.href = 'admin-login.html';
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const tbody = document.getElementById('orders-table-body');
            try {
                const response = await fetch('/api/orders');
                const orders = await response.json();

                tbody.innerHTML = orders.map(order => `
                    <tr>
                        <td>
                            <strong style="color: var(--eerie-black);">${new Date(order.date).toLocaleDateString()}</strong>
                            <br><small style="color: #666;">ID: ${order.id}</small>
                        </td>
                        <td>
                            <div style="font-weight: 500;">${order.name}</div>
                            <div style="color: #666; font-size: 0.9rem;">${order.email}</div>
                            <div style="color: #888; font-size: 0.8rem;">${order.address}</div>
                        </td>
                        <td>
                            <ul style="list-style: none; padding: 0;">
                                ${order.items.map(i => `
                                    <li style="padding: 5px 0; border-bottom: 1px dashed #eee; display: flex; justify-content: space-between;">
                                        <span>${i.title} <small style="color: #888;">(x${i.quantity})</small></span>
                                        <span>₹${(i.price * i.quantity).toFixed(2)}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </td>
                        <td style="font-weight: bold; font-size: 1.1rem; color: var(--bittersweet);">
                            ₹${order.total.toFixed(2)}
                        </td>
                        <td>
                            <select onchange="updateStatus(this, '${order.id}')" style="padding: 5px; border-radius: 4px; border: 1px solid #ccc; font-weight: 500; width: 100%;">
                                <option value="Pending" ${order.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option value="Shipped" ${order.status === 'Shipped' ? 'selected' : ''}>Shipped</option>
                                <option value="Delivered" ${order.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                                <option value="Cancelled" ${order.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                        </td>
                    </tr>
                `).join('');

                window.updateStatus = async (select, id) => {
                    const newStatus = select.value;
                    if (!confirm(`Update status for Order #${id} to ${newStatus}?`)) {
                        // Revert if cancelled
                        select.value = select.getAttribute('data-prev') || 'Pending'; // Simplified
                        return;
                    }
                    try {
                        const res = await fetch(`/api/orders/${id}/status`, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ status: newStatus })
                        });
                        if (res.ok) {
                            alert("Status Updated");
                        } else {
                            alert("Failed update");
                        }
                    } catch (e) { console.error(e); }
                };

            } catch (error) {
                console.error(error);
                tbody.innerHTML = '<tr><td colspan="6">Failed to load orders.</td></tr>';
            }

            // Handle Add Product
            const addForm = document.getElementById('add-product-form');
            if (addForm) {
                addForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const formData = new FormData(addForm);
                    const productData = {
                        title: formData.get('title'),
                        price: formData.get('price'),
                        category: formData.get('category'),
                        image: "./assets/images/" + formData.get('image'),
                        badge: "New"
                    };

                    try {
                        const res = await fetch('/api/products', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(productData)
                        });
                        if (res.ok) {
                            alert('Product added successfully!');
                            addForm.reset();
                        } else {
                            alert('Failed to add product.');
                        }
                    } catch (err) {
                        alert('Error adding product.');
                    }
                });
            }
        });
    </script>
</body>

</html>
