<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Footcap - Admin Login</title>
    <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 150px auto 50px;
            padding: 30px;
            border: 1px solid #eee;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            background: white;
        }

        .auth-title {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 30px;
            color: var(--eerie-black);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #ff4747;
            /* Fallback/Explicit color */
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
            display: block;
        }

        .btn-submit:hover {
            background: #ff2e2e;
        }
    </style>
</head>

<body id="top" style="background: #f9f9f9;">

    <main>
        <div class="auth-container">
            <h1 class="auth-title">Admin Login</h1>
            <form id="admin-login-form" autocomplete="off">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="admin@example.com" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="********" autocomplete="new-password">
                </div>
                <button type="submit" class="btn-submit">Login to Dashboard</button>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Mock Admin Validation (In real app, verify with backend)
            // Requested credentials: palanivel@gmail.com / 1234
            if (email === 'palanivel@gmail.com' && password === '1234') {
                alert('Admin Login Successful!');
                localStorage.setItem('footcap-admin-token', 'mock-admin-token-123');
                window.location.href = 'admin-dashboard.html';
            } else {
                alert('Invalid Admin Credentials!');
            }
        });
    </script>
</body>

</html>
