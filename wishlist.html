<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footcap - My Wishlist</title>
    <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">
</head>

<body id="top">
    <!-- HEADER -->
    <header class="header" data-header>
        <div class="container">
            <div class="overlay" data-overlay></div>
            <a href="index.html" class="logo"><img src="./assets/images/logo.svg" width="160" height="50"
                    alt="Footcap"></a>
            <button class="nav-open-btn" data-nav-open-btn><ion-icon name="menu-outline"></ion-icon></button>
            <nav class="navbar" data-navbar>
                <button class="nav-close-btn" data-nav-close-btn><ion-icon name="close-outline"></ion-icon></button>
                <a href="index.html" class="logo"><img src="./assets/images/logo.svg" width="190" height="50"
                        alt="Footcap"></a>
                <ul class="navbar-list">
                    <li class="navbar-item"><a href="index.html" class="navbar-link">Home</a></li>
                    <li class="navbar-item"><a href="about.html" class="navbar-link">About</a></li>
                    <li class="navbar-item"><a href="shop.html" class="navbar-link">Shop</a></li>

                    <li class="navbar-item"><a href="contact.html" class="navbar-link">Contact</a></li>
                </ul>
                <ul class="nav-action-list">
                    <li class="language-selector">
                        <button class="nav-action-btn">
                            <ion-icon name="globe-outline" aria-hidden="true"></ion-icon>
                            <span class="nav-action-text">EN</span>
                            <ion-icon name="chevron-down-outline" aria-hidden="true"></ion-icon>
                        </button>
                        <ul class="dropdown-list">
                            <li><a href="#" class="dropdown-link">English - EN</a></li>
                            <li><a href="#" class="dropdown-link">Hindi - HI</a></li>
                            <li><a href="#" class="dropdown-link">Tamil - TA</a></li>
                        </ul>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="section product">
            <div class="container">
                <h2 class="h2 section-title">My Wishlist</h2>
                <ul class="product-list" id="wishlist-container">
                    <!-- Loaded via JS -->
                </ul>
            </div>
        </section>
    </main>

    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <script src="./assets/js/script.js"></script>
    <script src="./assets/js/lang-script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const wishlist = JSON.parse(localStorage.getItem('footcap-wishlist')) || [];
            const container = document.getElementById('wishlist-container');

            const render = () => {
                if (wishlist.length === 0) {
                    container.innerHTML = '<p style="text-align:center; width:100%;">Your wishlist is empty.</p>';
                    return;
                }
                container.innerHTML = wishlist.map((product, index) => `
                    <li class="product-item">
                        <div class="product-card" tabindex="0">
                            <figure class="card-banner">
                                <img src="${product.image}" width="312" height="350" loading="lazy" alt="${product.title}" class="image-contain">
                                <ul class="card-action-list">
                                    <li class="card-action-item">
                                        <button class="card-action-btn add-to-cart-btn" data-id="${product.id}" data-price="${product.price}" data-title="${product.title}">
                                            <ion-icon name="cart-outline"></ion-icon>
                                        </button>
                                    </li>
                                </ul>
                            </figure>
                            <div class="card-content">
                                <h3 class="h3 card-title"><a href="product-details.html?id=${product.id}" class="product-link">${product.title}</a></h3>
                                <data class="card-price" value="${product.price}">₹${product.price}</data>
                                <button onclick="removeFromWishlist(${product.id})" style="display: flex; align-items: center; justify-content: center; gap: 5px; color: var(--bittersweet); background: white; border: 1px solid var(--bittersweet); padding: 8px 15px; border-radius: 4px; margin-top: 15px; cursor: pointer; font-size: 0.9rem; width: 100%;">
                                    <ion-icon name="trash-outline"></ion-icon> Remove
                                </button>
                            </div>
                        </div>
                    </li>
                 `).join('');
            };

            window.removeFromWishlist = (id) => {
                const currentWishlist = JSON.parse(localStorage.getItem('footcap-wishlist')) || [];
                const newWishlist = currentWishlist.filter(p => p.id != id);
                localStorage.setItem('footcap-wishlist', JSON.stringify(newWishlist));
                window.location.reload();
            };

            render();
        });
    </script>
</body>

</html>
