<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footcap - Checkout</title>
    <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        .checkout-container {
            padding-top: 150px;
            padding-bottom: 50px;
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 50px;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 30px;
            color: var(--eerie-black);
        }

        .form-section,
        .summary-section {
            padding: 30px;
            border: 1px solid #eee;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .cart-summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: 20px;
            color: var(--bittersweet);
        }

        .btn-checkout {
            width: 100%;
            padding: 15px;
            background: var(--bittersweet);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-checkout:hover {
            background: var(--salmon);
        }

        @media(max-width: 768px) {
            .checkout-container {
                grid-template-columns: 1fr;
                padding: 120px 20px 50px;
            }
        }
    </style>
</head>

<body id="top">
    <!-- HEADER -->
    <header class="header" data-header>
        <div class="container">
            <div class="overlay" data-overlay></div>
            <a href="index.html" class="logo"><img src="./assets/images/logo.svg" width="160" height="50"
                    alt="Footcap"></a>
            <button class="nav-open-btn" data-nav-open-btn><ion-icon name="menu-outline"></ion-icon></button>
            <nav class="navbar" data-navbar>
                <button class="nav-close-btn" data-nav-close-btn><ion-icon name="close-outline"></ion-icon></button>
                <a href="index.html" class="logo"><img src="./assets/images/logo.svg" width="190" height="50"
                        alt="Footcap"></a>
                <ul class="navbar-list">
                    <li class="navbar-item"><a href="index.html" class="navbar-link">Home</a></li>
                    <li class="navbar-item"><a href="about.html" class="navbar-link">About</a></li>
                    <li class="navbar-item"><a href="shop.html" class="navbar-link">Shop</a></li>
                    
                    <li class="navbar-item"><a href="contact.html" class="navbar-link">Contact</a></li>
                </ul>
                <ul class="nav-action-list">
                    <li class="language-selector">
                        <button class="nav-action-btn">
                            <ion-icon name="globe-outline" aria-hidden="true"></ion-icon>
                            <span class="nav-action-text">EN</span>
                            <ion-icon name="chevron-down-outline" aria-hidden="true"></ion-icon>
                        </button>
                        <ul class="dropdown-list">
                            <li><a href="#" class="dropdown-link">English - EN</a></li>
                            <li><a href="#" class="dropdown-link">Hindi - HI</a></li>
                            <li><a href="#" class="dropdown-link">Tamil - TA</a></li>
                        </ul>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="checkout-container">
            <!-- Form Section -->
            <div class="form-section">
                <h2 class="section-title">Shipping Details</h2>
                <form id="checkout-form">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label for="address">Address</label>
                        <textarea id="address" rows="3" required
                            placeholder="123 Street Name, City, Country"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="card">Card Number (Mock)</label>
                        <input type="text" id="card" placeholder="xxxx-xxxx-xxxx-xxxx" required>
                    </div>
                    <button type="submit" class="btn-checkout">Place Order</button>
                </form>
            </div>

            <!-- Summary Section -->
            <div class="summary-section">
                <h2 class="section-title">Order Summary</h2>
                <div id="cart-items-container">
                    <!-- Dynamic Cart Items -->
                </div>
                <div class="total-row">
                    <span>Total</span>
                    <span id="cart-total">$0.00</span>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <script src="./assets/js/script.js"></script>
    <script src="./assets/js/lang-script.js"></script>
    <script src="./assets/js/checkout.js"></script>
</body>

</html>
